<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Webpage</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <div class="selector_box">
        <span class="selected_text">Select Sex</span>
        <div class="selector_option" id="m">Male</div>
        <div class="selector_option" id="f">Female</div>
    </div>

    <div class="date">
        <input type="text" id="day" class="date_input" placeholder="Day">
        <input type="text" id="month" class="date_input" placeholder="Month">
        <input type="text" id="year" class="date_input" placeholder="Year">
    </div>

    <div class="input_holder">
        <input type="text" id="name" class="input" placeholder="Full Name">
    </div>

    <div class="upload">
        <p>Click to upload image</p>
        <img class="upload_uploaded" src="" alt="">
    </div>

    <button class="go">Submit</button>

    <div class="guide_holder">
        <p>Click for Guide</p>
    </div>

    <script src="index.js"></script>
</body>
</html>
